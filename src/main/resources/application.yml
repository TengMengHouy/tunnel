server:
  port: ${PORT:8080}

spring:
  application:
    name: tunnel-server
  datasource:
    driver-class-name: org.postgresql.Driver
    username: itpusr
    password: itp@168
    url: jdbc:postgresql://localhost:5168/itp_main_db
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  liquibase:
    enabled: true
    driver-class-name: org.postgresql.Driver
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  auth:
    mock-enabled: true
  iam:
    base-url: http://localhost:9090

axon:
  axonserver:
    enabled: false

  # Kafka is used ONLY as an event publisher so that other services can consume tunnel events.
  # This service's own read-model (TunnelProjection) is updated directly via
  # Axon's local subscribing event processor — no Kafka consumer is needed here.
  kafka:
    bootstrap-servers: localhost:29092,localhost:29094,localhost:29096
    default-topic: Axon.AccountCQRS.Events
    client-id: kafka-axon-account
    message-converter-mode: default # alternative is cloud_event <https://cloudevents.io/>
    properties:
      security.protocol: PLAINTEXT # PLAINTEXT for no security purpose
    publisher:
      confirmation-mode: transactional
    producer:
      transaction-id-prefix: kafka-axon-
      retries: 5 # bigger than zero in case of using transactional confirmation-mode
      event-processor-mode: tracking
  #    consumer:
  #      event-processor-mode: subscribing
  #      properties:
  #        isolation.level: read_committed
  serializer:
    general: jackson
    events: jackson
    messages: jackson