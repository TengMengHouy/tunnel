server:
  port: ${PORT:8080}

spring:
  application:
    name: tunnel-server
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${PG_USERNAME}
    password: ${PG_PASSWORD}
    url: jdbc:postgresql://${PG_HOST}:${PG_PORT}/${PG_DB_NAME}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  liquibase:
    enabled: true
    driver-class-name: org.postgresql.Driver
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  auth:
    mock-enabled: true
  iam:
    base-url: http://localhost:9090

axon:
  axonserver:
    enabled: false

  # Kafka is used ONLY as an event publisher so that other services can consume tunnel events.
  # This service's own read-model (TunnelProjection) is updated directly via
  # Axon's local subscribing event processor — no Kafka consumer is needed here.
  kafka:
    bootstrap-servers: ${KAFKA_URL}
    default-topic: tunnel.events
    client-id: kafka-axon-tunnel
    message-converter-mode: default
    properties:
      security.protocol: SASL_PLAINTEXT
      sasl.mechanism: PLAIN
      sasl.jaas.config: "org.apache.kafka.common.security.plain.PlainLoginModule required username=\"kafka\" password=\"${KAFKA_PASSWORD}\";"
    publisher:
      confirmation-mode: transactional
    producer:
      transaction-id-prefix: kafka-axon-tunnel-
      retries: 5
    # consumer section removed — this service does not consume from Kafka

  serializer:
    general: jackson
    events: jackson
    messages: jackson